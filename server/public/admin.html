<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大宣法拍 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
    
    /* 登录页 */
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 360px; }
    .login-title { text-align: center; font-size: 24px; margin-bottom: 30px; color: #1a3a5c; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; color: #666; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { 
      width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; 
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { 
      outline: none; border-color: #1890ff; 
    }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    .btn-primary { background: #1890ff; color: white; width: 100%; }
    .btn-primary:hover { background: #40a9ff; }
    .error-msg { color: #ff4d4f; font-size: 13px; margin-top: 10px; text-align: center; }
    
    /* 主界面 */
    .main-container { display: none; min-height: 100vh; }
    .sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100vh; background: #1a3a5c; color: white; padding: 20px 0; }
    .sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 18px; font-weight: bold; }
    .sidebar-menu { padding: 20px 0; }
    .menu-item { padding: 12px 20px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
    .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); }
    .menu-item-icon { font-size: 16px; }
    
    .content { margin-left: 200px; padding: 24px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; color: #1a3a5c; }
    
    /* 卡片 */
    .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    
    /* 统计卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 8px; padding: 20px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: bold; color: #1890ff; }
    .stat-label { color: #999; font-size: 14px; margin-top: 8px; }
    
    /* 表格 */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
    .data-table th { background: #fafafa; font-weight: 500; color: #666; }
    .data-table tr:hover { background: #fafafa; }
    
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .badge-success { background: #f6ffed; color: #52c41a; }
    .badge-warning { background: #fffbe6; color: #faad14; }
    .badge-error { background: #fff2f0; color: #ff4d4f; }
    
    .action-btns { display: flex; gap: 8px; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn-link { background: none; border: none; color: #1890ff; cursor: pointer; padding: 0; }
    .btn-link:hover { text-decoration: underline; }
    .btn-danger { background: #ff4d4f; color: white; }
    
    /* 分页 */
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
    .pagination button { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
    .pagination button.active { background: #1890ff; color: white; border-color: #1890ff; }
    
    /* 房源表单 */
    .house-form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .house-form .full-width { grid-column: 1 / -1; }
    
    /* 弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 8px; width: 800px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }
    .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
    
    /* 切换开关 */
    .toggle-switch { position: relative; width: 44px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 22px; transition: 0.3s; }
    .toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.3s; }
    .toggle-switch input:checked + .toggle-slider { background: #1890ff; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(22px); }
    
    .page-section { display: none; }
    .page-section.active { display: block; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <div class="login-title">🏠 大宣法拍管理后台</div>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="loginPhone" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码">
      </div>
      <button class="btn btn-primary" onclick="login()">登 录</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- 主界面 -->
  <div class="main-container" id="mainContainer">
    <div class="sidebar">
      <div class="sidebar-logo">🏠 大宣法拍</div>
      <div class="sidebar-menu">
        <div class="menu-item active" data-page="dashboard">📊 数据概览</div>
        <div class="menu-item" data-page="houses">🏠 房源管理</div>
        <div class="menu-item" data-page="users">👥 用户管理</div>
        <div class="menu-item" data-page="news">📢 内容管理</div>
        <div class="menu-item" data-page="contacts">💬 咨询记录</div>
        <div class="menu-item" onclick="logout()">🚪 退出登录</div>
      </div>
    </div>
    
    <div class="content">
      <!-- 数据概览 -->
      <div class="page-section active" id="page-dashboard">
        <div class="page-header"><h1 class="page-title">数据概览</h1></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="statUsers">-</div><div class="stat-label">总用户</div></div>
          <div class="stat-card"><div class="stat-value" id="statMembers">-</div><div class="stat-label">会员数</div></div>
          <div class="stat-card"><div class="stat-value" id="statHouses">-</div><div class="stat-label">房源数</div></div>
          <div class="stat-card"><div class="stat-value" id="statContacts">-</div><div class="stat-label">待处理咨询</div></div>
        </div>
      </div>
      
      <!-- 房源管理 -->
      <div class="page-section" id="page-houses">
        <div class="page-header">
          <h1 class="page-title">房源管理</h1>
          <button class="btn btn-primary" onclick="showHouseModal()">+ 添加房源</button>
        </div>
        <div class="card">
          <table class="data-table">
            <thead><tr><th>标题</th><th>区域</th><th>起拍价</th><th>状态</th><th>平台</th><th>操作</th></tr></thead>
            <tbody id="housesTable"></tbody>
          </table>
          <div class="pagination" id="housesPagination"></div>
        </div>
      </div>
      
      <!-- 用户管理 -->
      <div class="page-section" id="page-users">
        <div class="page-header"><h1 class="page-title">用户管理</h1></div>
        <div class="card">
          <table class="data-table">
            <thead><tr><th>手机号</th><th>昵称</th><th>会员状态</th><th>到期时间</th><th>注册时间</th><th>操作</th></tr></thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </div>
      
      <!-- 内容管理 -->
      <div class="page-section" id="page-news">
        <div class="page-header">
          <h1 class="page-title">内容管理</h1>
          <button class="btn btn-primary" onclick="showNewsModal()">+ 添加内容</button>
        </div>
        <div class="card">
          <table class="data-table">
            <thead><tr><th>类型</th><th>标题</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
            <tbody id="newsTable"></tbody>
          </table>
        </div>
      </div>
      
      <!-- 咨询记录 -->
      <div class="page-section" id="page-contacts">
        <div class="page-header"><h1 class="page-title">咨询记录</h1></div>
        <div class="card">
          <table class="data-table">
            <thead><tr><th>用户</th><th>房源</th><th>留言</th><th>时间</th><th>状态</th></tr></thead>
            <tbody id="contactsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 房源编辑弹窗 -->
  <div class="modal" id="houseModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="houseModalTitle">添加房源</h3>
        <button class="close-btn" onclick="closeHouseModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="house-form">
          <div class="form-group"><label>标题 *</label><input type="text" id="houseTitle"></div>
          <div class="form-group"><label>区域 *</label><select id="houseDistrict">
            <option value="福田">福田</option><option value="南山">南山</option><option value="罗湖">罗湖</option>
            <option value="宝安">宝安</option><option value="龙岗">龙岗</option><option value="龙华">龙华</option>
            <option value="盐田">盐田</option><option value="光明">光明</option><option value="坪山">坪山</option>
          </select></div>
          <div class="form-group"><label>详细地址</label><input type="text" id="houseAddress"></div>
          <div class="form-group"><label>物业类型</label><select id="housePropertyType">
            <option value="住宅">住宅</option><option value="商铺">商铺</option><option value="办公">办公</option>
            <option value="公寓">公寓</option><option value="别墅">别墅</option><option value="其他">其他</option>
          </select></div>
          <div class="form-group"><label>面积(m²)</label><input type="number" id="houseArea"></div>
          <div class="form-group"><label>户型</label><input type="text" id="houseRoomLayout" placeholder="如：3室2厅"></div>
          <div class="form-group"><label>市场价(元)</label><input type="number" id="houseMarketPrice"></div>
          <div class="form-group"><label>起拍价(元) *</label><input type="number" id="houseAuctionStartPrice"></div>
          <div class="form-group"><label>保证金(元)</label><input type="number" id="houseDeposit"></div>
          <div class="form-group"><label>当前价(元)</label><input type="number" id="houseCurrentPrice"></div>
          <div class="form-group"><label>拍卖平台 *</label><select id="housePlatform">
            <option value="ali">阿里拍卖</option><option value="jd">京东拍卖</option>
          </select></div>
          <div class="form-group"><label>平台链接</label><input type="text" id="housePlatformUrl" placeholder="拍卖详情页URL"></div>
          <div class="form-group"><label>开拍时间 *</label><input type="datetime-local" id="houseAuctionStartTime"></div>
          <div class="form-group"><label>结束时间 *</label><input type="datetime-local" id="houseAuctionEndTime"></div>
          <div class="form-group"><label>状态</label><select id="houseStatus">
            <option value="pending">待拍卖</option><option value="ongoing">拍卖中</option>
            <option value="ended">已结束</option><option value="sold">已成交</option>
          </select></div>
          <div class="form-group"><label>风险等级</label><select id="houseRiskLevel">
            <option value="低">低</option><option value="中">中</option><option value="高">高</option>
          </select></div>
          <div class="form-group"><label>楼层</label><input type="text" id="houseFloor"></div>
          <div class="form-group"><label>朝向</label><input type="text" id="houseOrientation"></div>
          <div class="form-group"><label>建成年代</label><input type="text" id="houseBuildingAge"></div>
          <div class="form-group"><label>装修</label><input type="text" id="houseDecoration"></div>
          <div class="form-group full-width"><label>图片链接(每行一个)</label><textarea id="houseImages" rows="3"></textarea></div>
          <div class="form-group full-width"><label>优点(每行一条)</label><textarea id="housePros" rows="2"></textarea></div>
          <div class="form-group full-width"><label>缺点/风险(每行一条)</label><textarea id="houseCons" rows="2"></textarea></div>
          <div class="form-group full-width"><label>综合评价</label><input type="text" id="houseSummary"></div>
          <div class="form-group full-width"><label>备注</label><textarea id="houseRemark" rows="2"></textarea></div>
          <div class="form-group"><label>启用成本计算器</label>
            <label class="toggle-switch"><input type="checkbox" id="houseEnableCalculator"><span class="toggle-slider"></span></label>
          </div>
          <input type="hidden" id="houseId">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeHouseModal()">取消</button>
        <button class="btn btn-primary" onclick="saveHouse()">保存</button>
      </div>
    </div>
  </div>

  <!-- 内容编辑弹窗 -->
  <div class="modal" id="newsModal">
    <div class="modal-content" style="width: 600px;">
      <div class="modal-header">
        <h3 id="newsModalTitle">添加内容</h3>
        <button class="close-btn" onclick="closeNewsModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label>类型</label><select id="newsType">
          <option value="success">学员报喜</option><option value="service">服务介绍</option>
        </select></div>
        <div class="form-group"><label>标题</label><input type="text" id="newsTitle"></div>
        <div class="form-group"><label>内容</label><textarea id="newsContent" rows="4"></textarea></div>
        <div class="form-group"><label>图片链接</label><input type="text" id="newsImage"></div>
        <div class="form-group"><label>排序权重</label><input type="number" id="newsSort" value="0"></div>
        <input type="hidden" id="newsId">
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeNewsModal()">取消</button>
        <button class="btn btn-primary" onclick="saveNews()">保存</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    let token = localStorage.getItem('adminToken');
    
    // 初始化
    if (token) {
      checkAuth();
    }
    
    // 菜单切换
    document.querySelectorAll('.menu-item[data-page]').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + item.dataset.page).classList.add('active');
        loadPageData(item.dataset.page);
      });
    });
    
    function checkAuth() {
      fetch(API + '/admin/stats', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json()).then(res => {
        if (res.code === 0) {
          showMain();
          loadDashboard();
        } else {
          localStorage.removeItem('adminToken');
          token = null;
        }
      }).catch(() => {
        localStorage.removeItem('adminToken');
        token = null;
      });
    }
    
    function login() {
      const phone = document.getElementById('loginPhone').value;
      const password = document.getElementById('loginPassword').value;
      fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      }).then(r => r.json()).then(res => {
        if (res.code === 0 && res.data.role === 'admin') {
          token = res.data.token;
          localStorage.setItem('adminToken', token);
          showMain();
          loadDashboard();
        } else {
          document.getElementById('loginError').textContent = res.msg || '登录失败或无权限';
        }
      });
    }
    
    function logout() {
      localStorage.removeItem('adminToken');
      location.reload();
    }
    
    function showMain() {
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainContainer').style.display = 'block';
    }
    
    function loadPageData(page) {
      switch(page) {
        case 'dashboard': loadDashboard(); break;
        case 'houses': loadHouses(); break;
        case 'users': loadUsers(); break;
        case 'news': loadNews(); break;
        case 'contacts': loadContacts(); break;
      }
    }
    
    function loadDashboard() {
      fetch(API + '/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            document.getElementById('statUsers').textContent = res.data.totalUsers;
            document.getElementById('statMembers').textContent = res.data.activeMembers;
            document.getElementById('statHouses').textContent = res.data.totalHouses;
            document.getElementById('statContacts').textContent = res.data.newContacts;
          }
        });
    }
    
    function loadHouses(page = 1) {
      fetch(API + '/houses?page=' + page + '&pageSize=10', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            const tbody = document.getElementById('housesTable');
            tbody.innerHTML = res.data.list.map(h => {
              const statusMap = {pending:'待拍卖',ongoing:'拍卖中',ended:'已结束',sold:'已成交'};
              const platformMap = {ali:'阿里',jd:'京东'};
              return '<tr>' +
                '<td>' + (h.title||'').substring(0,20) + '...</td>' +
                '<td>' + h.district + '</td>' +
                '<td>' + formatPrice(h.auctionStartPrice) + '</td>' +
                '<td><span class="badge badge-' + (h.status==='ongoing'?'success':h.status==='ended'?'':'warning') + '">' + (statusMap[h.status]||h.status) + '</span></td>' +
                '<td>' + (platformMap[h.platform]||h.platform) + '</td>' +
                '<td class="action-btns">' +
                  '<button class="btn btn-sm" onclick="editHouse(\'' + h._id + '\')">编辑</button> ' +
                  '<button class="btn btn-sm btn-danger" onclick="deleteHouse(\'' + h._id + '\')">删除</button>' +
                '</td></tr>';
            }).join('');
          }
        });
    }
    
    function formatPrice(v) {
      if (!v) return '-';
      return v >= 100000000 ? (v/100000000).toFixed(1) + '亿' : (v/10000).toFixed(0) + '万';
    }
    
    function showHouseModal(id = null) {
      document.getElementById('houseModalTitle').textContent = id ? '编辑房源' : '添加房源';
      document.getElementById('houseId').value = id || '';
      if (!id) {
        // 清空表单
        document.querySelectorAll('#houseModal input, #houseModal select, #houseModal textarea').forEach(el => {
          if (el.type === 'checkbox') el.checked = false;
          else if (el.tagName !== 'SELECT') el.value = '';
        });
      }
      document.getElementById('houseModal').classList.add('show');
    }
    
    function closeHouseModal() {
      document.getElementById('houseModal').classList.remove('show');
    }
    
    function editHouse(id) {
      fetch(API + '/houses/' + id)
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            const h = res.data;
            document.getElementById('houseId').value = h._id;
            document.getElementById('houseTitle').value = h.title || '';
            document.getElementById('houseDistrict').value = h.district || '福田';
            document.getElementById('houseAddress').value = h.address || '';
            document.getElementById('housePropertyType').value = h.propertyType || '住宅';
            document.getElementById('houseArea').value = h.area || '';
            document.getElementById('houseRoomLayout').value = h.roomLayout || '';
            document.getElementById('houseMarketPrice').value = h.marketPrice || '';
            document.getElementById('houseAuctionStartPrice').value = h.auctionStartPrice || '';
            document.getElementById('houseDeposit').value = h.deposit || '';
            document.getElementById('houseCurrentPrice').value = h.currentPrice || '';
            document.getElementById('housePlatform').value = h.platform || 'ali';
            document.getElementById('housePlatformUrl').value = h.platformUrl || '';
            document.getElementById('houseStatus').value = h.status || 'pending';
            document.getElementById('houseRiskLevel').value = h.riskLevel || '中';
            document.getElementById('houseFloor').value = h.floor || '';
            document.getElementById('houseOrientation').value = h.orientation || '';
            document.getElementById('houseBuildingAge').value = h.buildingAge || '';
            document.getElementById('houseDecoration').value = h.decoration || '';
            document.getElementById('houseImages').value = (h.images||[]).join('\n');
            document.getElementById('housePros').value = (h.prosCons?.pros||[]).join('\n');
            document.getElementById('houseCons').value = (h.prosCons?.cons||[]).join('\n');
            document.getElementById('houseSummary').value = h.prosCons?.summary || '';
            document.getElementById('houseRemark').value = h.remark || '';
            document.getElementById('houseEnableCalculator').checked = h.enableCalculator || false;
            if (h.auctionStartTime) {
              document.getElementById('houseAuctionStartTime').value = new Date(h.auctionStartTime).toISOString().slice(0,16);
            }
            if (h.auctionEndTime) {
              document.getElementById('houseAuctionEndTime').value = new Date(h.auctionEndTime).toISOString().slice(0,16);
            }
            showHouseModal(h._id);
          }
        });
    }
    
    function saveHouse() {
      const id = document.getElementById('houseId').value;
      const data = {
        title: document.getElementById('houseTitle').value,
        district: document.getElementById('houseDistrict').value,
        address: document.getElementById('houseAddress').value,
        propertyType: document.getElementById('housePropertyType').value,
        area: parseFloat(document.getElementById('houseArea').value) || undefined,
        roomLayout: document.getElementById('houseRoomLayout').value,
        marketPrice: parseFloat(document.getElementById('houseMarketPrice').value) || undefined,
        auctionStartPrice: parseFloat(document.getElementById('houseAuctionStartPrice').value),
        deposit: parseFloat(document.getElementById('houseDeposit').value) || undefined,
        currentPrice: parseFloat(document.getElementById('houseCurrentPrice').value) || undefined,
        platform: document.getElementById('housePlatform').value,
        platformUrl: document.getElementById('housePlatformUrl').value,
        auctionStartTime: document.getElementById('houseAuctionStartTime').value,
        auctionEndTime: document.getElementById('houseAuctionEndTime').value,
        status: document.getElementById('houseStatus').value,
        riskLevel: document.getElementById('houseRiskLevel').value,
        floor: document.getElementById('houseFloor').value,
        orientation: document.getElementById('houseOrientation').value,
        buildingAge: document.getElementById('houseBuildingAge').value,
        decoration: document.getElementById('houseDecoration').value,
        images: document.getElementById('houseImages').value.split('\n').filter(s => s.trim()),
        prosCons: {
          pros: document.getElementById('housePros').value.split('\n').filter(s => s.trim()),
          cons: document.getElementById('houseCons').value.split('\n').filter(s => s.trim()),
          summary: document.getElementById('houseSummary').value
        },
        remark: document.getElementById('houseRemark').value,
        enableCalculator: document.getElementById('houseEnableCalculator').checked,
        source: 'manual'
      };
      
      const url = id ? API + '/admin/houses/' + id : API + '/admin/houses';
      const method = id ? 'PUT' : 'POST';
      
      fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(data)
      }).then(r => r.json()).then(res => {
        if (res.code === 0) {
          closeHouseModal();
          loadHouses();
          alert('保存成功');
        } else {
          alert('保存失败：' + res.msg);
        }
      });
    }
    
    function deleteHouse(id) {
      if (!confirm('确定删除该房源？')) return;
      fetch(API + '/admin/houses/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json()).then(res => {
        if (res.code === 0) {
          loadHouses();
        } else {
          alert('删除失败');
        }
      });
    }
    
    function loadUsers() {
      fetch(API + '/admin/users', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = res.data.list.map(u => {
              const membershipMap = {pending:'待审核',active:'已开通',rejected:'已拒绝'};
              return '<tr>' +
                '<td>' + u.phone + '</td>' +
                '<td>' + (u.nickname||'-') + '</td>' +
                '<td><span class="badge badge-' + (u.membership==='active'?'success':u.membership==='pending'?'warning':'error') + '">' + (membershipMap[u.membership]||u.membership) + '</span></td>' +
                '<td>' + (u.membershipExpire ? new Date(u.membershipExpire).toLocaleDateString() : '-') + '</td>' +
                '<td>' + new Date(u.createdAt).toLocaleDateString() + '</td>' +
                '<td>' + (u.membership==='pending' ? 
                  '<button class="btn btn-sm" onclick="approveUser(\'' + u._id + '\')">开通</button> ' +
                  '<button class="btn btn-sm btn-danger" onclick="rejectUser(\'' + u._id + '\')">拒绝</button>' : '-') +
                '</td></tr>';
            }).join('');
          }
        });
    }
    
    function approveUser(id) {
      const expire = prompt('会员到期日期(YYYY-MM-DD):', new Date(Date.now() + 365*86400000).toISOString().slice(0,10));
      if (!expire) return;
      fetch(API + '/admin/users/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ membership: 'active', membershipExpire: expire })
      }).then(r => r.json()).then(res => {
        if (res.code === 0) loadUsers();
      });
    }
    
    function rejectUser(id) {
      fetch(API + '/admin/users/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ membership: 'rejected' })
      }).then(r => r.json()).then(res => {
        if (res.code === 0) loadUsers();
      });
    }
    
    function loadNews() {
      fetch(API + '/news', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            const tbody = document.getElementById('newsTable');
            tbody.innerHTML = res.data.list.map(n => {
              const typeMap = {success:'学员报喜',service:'服务介绍'};
              return '<tr>' +
                '<td>' + (typeMap[n.type]||n.type) + '</td>' +
                '<td>' + (n.title||'-') + '</td>' +
                '<td><span class="badge badge-success">' + (n.status==='active'?'已发布':'草稿') + '</span></td>' +
                '<td>' + new Date(n.createdAt).toLocaleDateString() + '</td>' +
                '<td>' +
                  '<button class="btn btn-sm" onclick="editNews(\'' + n._id + '\')">编辑</button> ' +
                  '<button class="btn btn-sm btn-danger" onclick="deleteNews(\'' + n._id + '\')">删除</button>' +
                '</td></tr>';
            }).join('');
          }
        });
    }
    
    function showNewsModal() {
      document.getElementById('newsModalTitle').textContent = '添加内容';
      document.getElementById('newsId').value = '';
      document.querySelectorAll('#newsModal input, #newsModal textarea').forEach(el => el.value = '');
      document.getElementById('newsSort').value = '0';
      document.getElementById('newsModal').classList.add('show');
    }
    
    function closeNewsModal() {
      document.getElementById('newsModal').classList.remove('show');
    }
    
    function saveNews() {
      const id = document.getElementById('newsId').value;
      const data = {
        type: document.getElementById('newsType').value,
        title: document.getElementById('newsTitle').value,
        content: document.getElementById('newsContent').value,
        image: document.getElementById('newsImage').value,
        sort: parseInt(document.getElementById('newsSort').value) || 0,
        status: 'active'
      };
      
      const url = id ? API + '/news/' + id : API + '/news';
      const method = id ? 'PUT' : 'POST';
      
      fetch(url, {
        method: method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(data)
      }).then(r => r.json()).then(res => {
        if (res.code === 0) {
          closeNewsModal();
          loadNews();
        } else {
          alert('保存失败');
        }
      });
    }
    
    function deleteNews(id) {
      if (!confirm('确定删除？')) return;
      fetch(API + '/news/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => r.json()).then(res => {
        if (res.code === 0) loadNews();
      });
    }
    
    function loadContacts() {
      fetch(API + '/admin/contacts', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(r => r.json()).then(res => {
          if (res.code === 0) {
            const tbody = document.getElementById('contactsTable');
            tbody.innerHTML = res.data.map(c => '<tr>' +
              '<td>' + (c.userId?.phone||'游客') + '</td>' +
              '<td>' + (c.houseId?.title||'-').substring(0,15) + '...</td>' +
              '<td>' + (c.message||'-') + '</td>' +
              '<td>' + new Date(c.createdAt).toLocaleString() + '</td>' +
              '<td><span class="badge badge-' + (c.status==='new'?'warning':'success') + '">' + (c.status==='new'?'新':'已处理') + '</span></td>' +
            '</tr>').join('');
          }
        });
    }
  </script>
</body>
</html>
